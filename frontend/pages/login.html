<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Connexion — WANTED</title>
<link rel="stylesheet" href="../css/main.css">
<style>body{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo-wrap"><div class="auth-logo-icon">W</div><div class="auth-logo-name">Wan<span>ted</span></div></div>
    <div class="auth-title">Connexion</div>
    <div class="auth-sub">Accédez à votre espace et aidez à retrouver des proches.</div>
    <div class="input-group"><label class="input-label">Email</label>
      <input class="input" id="email" type="email" inputmode="email" placeholder="votre@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="input-group"><label class="input-label">Mot de passe</label>
      <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="error-msg" id="err"></div>
    <div style="text-align:right;margin:-8px 0 16px"><a href="forgot-password.html" style="font-size:12px;color:var(--muted2)">Mot de passe oublié ?</a></div>
    <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="login()">Se connecter</button>
    <div class="auth-switch">Pas de compte ? <a onclick="location.href='register.html'">S'inscrire</a></div>
  </div>
</div>
<div class="toast-stack" id="toast-stack"></div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
if (Auth.isLoggedIn()) location.href = '../index.html';

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const err   = document.getElementById('err');
  const btn   = document.getElementById('login-btn');
  if (!email || !pass) { err.textContent = 'Email et mot de passe requis'; return; }
  try {
    btn.disabled = true; btn.textContent = 'Connexion…';
    const d = await api.post('/auth/login', { email, password: pass });
    Auth.setToken(d.token); Auth.setUser(d.user);
    const next = new URLSearchParams(location.search).get('next');
    location.href = next || '../index.html';
  } catch (e) { err.textContent = e.message; btn.disabled = false; btn.textContent = 'Se connecter'; }
}
</script>
</body>
</html>

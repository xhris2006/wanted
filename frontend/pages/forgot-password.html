<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mot de passe oublié — WANTED</title>
<link rel="stylesheet" href="../css/main.css">
<style>body{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo-wrap"><div class="auth-logo-icon">W</div><div class="auth-logo-name">Wan<span>ted</span></div></div>
    <div class="auth-title">Mot de passe oublié</div>
    <div class="auth-sub">Entrez votre email pour recevoir un lien de réinitialisation.</div>
    <div class="input-group"><label class="input-label">Email</label>
      <input class="input" id="email" type="email" inputmode="email" placeholder="votre@email.com" onkeydown="if(event.key==='Enter')sendReset()">
    </div>
    <div class="error-msg" id="err"></div>
    <div class="success-msg" id="ok"></div>
    <button class="btn btn-primary btn-full btn-lg" id="send-btn" onclick="sendReset()">ENVOYER LE LIEN</button>
    <div class="auth-switch"><a onclick="location.href='login.html'">← Retour à la connexion</a></div>
  </div>
</div>
<div class="toast-stack" id="toast-stack"></div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
async function sendReset() {
  const email = document.getElementById('email').value.trim();
  const err = document.getElementById('err'), ok = document.getElementById('ok');
  const btn = document.getElementById('send-btn');
  if (!email) { err.textContent = 'Email requis'; return; }
  try {
    btn.disabled = true; btn.textContent = 'Envoi…';
    await api.post('/auth/forgot-password', { email });
    ok.textContent = 'Si cet email existe, un lien a été envoyé. Vérifiez vos spams.';
    err.textContent = '';
  } catch (e) { err.textContent = e.message; }
  finally { btn.disabled = false; btn.textContent = 'ENVOYER LE LIEN'; }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Réinitialisation — WANTED</title>
<link rel="stylesheet" href="../css/main.css">
<style>body{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo-wrap"><div class="auth-logo-icon">W</div><div class="auth-logo-name">Wan<span>ted</span></div></div>
    <div class="auth-title">Nouveau mot de passe</div>
    <div class="auth-sub">Choisissez un nouveau mot de passe sécurisé.</div>
    <div class="input-group"><label class="input-label">Nouveau mot de passe</label>
      <input class="input" id="password" type="password" placeholder="min. 8 caractères" autocomplete="new-password">
    </div>
    <div class="input-group"><label class="input-label">Confirmer</label>
      <input class="input" id="confirm" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')reset()">
    </div>
    <div class="error-msg" id="err"></div>
    <div class="success-msg" id="ok"></div>
    <button class="btn btn-primary btn-full btn-lg" id="reset-btn" onclick="reset()">CHANGER LE MOT DE PASSE</button>
    <div class="auth-switch"><a onclick="location.href='login.html'">← Retour à la connexion</a></div>
  </div>
</div>
<div class="toast-stack" id="toast-stack"></div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) { document.getElementById('err').textContent = 'Lien invalide ou expiré.'; document.getElementById('reset-btn').disabled = true; }

async function reset() {
  const pw = document.getElementById('password').value;
  const cf = document.getElementById('confirm').value;
  const err = document.getElementById('err'), ok = document.getElementById('ok');
  const btn = document.getElementById('reset-btn');
  if (!pw || pw.length < 8) { err.textContent = 'Mot de passe trop court (min 8 caractères)'; return; }
  if (pw !== cf) { err.textContent = 'Les mots de passe ne correspondent pas'; return; }
  try {
    btn.disabled = true; btn.textContent = 'Changement…';
    await api.post('/auth/reset-password', { token, password: pw });
    ok.textContent = 'Mot de passe changé ! Redirection…';
    err.textContent = '';
    setTimeout(() => location.href = 'login.html', 2000);
  } catch(e) { err.textContent = e.message; btn.disabled = false; btn.textContent = 'CHANGER LE MOT DE PASSE'; }
}
</script>
</body>
</html>

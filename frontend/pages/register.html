<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Inscription — WANTED</title>
<link rel="stylesheet" href="../css/main.css">
<style>body{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo-wrap"><div class="auth-logo-icon">W</div><div class="auth-logo-name">Wan<span>ted</span></div></div>
    <div class="auth-title">Inscription</div>
    <div class="auth-sub">Rejoignez la communauté et recevez <strong style="color:var(--gold)">100 coins</strong> de bienvenue.</div>
    <div class="input-group"><label class="input-label">Nom complet *</label>
      <input class="input" id="name" placeholder="Prénom Nom" autocomplete="name">
    </div>
    <div class="input-group"><label class="input-label">Email *</label>
      <input class="input" id="email" type="email" inputmode="email" placeholder="votre@email.com" autocomplete="email">
    </div>
    <div class="input-group"><label class="input-label">Mot de passe *</label>
      <input class="input" id="password" type="password" placeholder="min. 8 caractères" autocomplete="new-password" onkeydown="if(event.key==='Enter')register()">
    </div>
    <div class="error-msg" id="err"></div>
    <button class="btn btn-primary btn-full btn-lg" id="reg-btn" onclick="register()" style="margin-top:6px">Créer mon compte</button>
    <div class="auth-switch">Déjà membre ? <a onclick="location.href='login.html'">Se connecter</a></div>
  </div>
</div>
<div class="toast-stack" id="toast-stack"></div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
if (Auth.isLoggedIn()) location.href = '../index.html';

async function register() {
  const fullName = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err      = document.getElementById('err');
  const btn      = document.getElementById('reg-btn');
  if (!fullName || !email || !password) { err.textContent = 'Tous les champs sont requis'; return; }
  if (password.length < 8) { err.textContent = 'Mot de passe trop court (min 8 caractères)'; return; }
  try {
    btn.disabled = true; btn.textContent = 'Création…';
    const d = await api.post('/auth/register', { fullName, email, password });
    Auth.setToken(d.token); Auth.setUser(d.user);
    toast('Bienvenue ' + d.user.full_name + ' 🎉 +100 coins !', 'coin');
    setTimeout(() => location.href = '../index.html', 1200);
  } catch (e) { err.textContent = e.message; btn.disabled = false; btn.textContent = 'Créer mon compte'; }
}
</script>
</body>
</html>
